<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Lectura con Nostalgia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:serif;
  background:#f2e6c9;
  color:#3a2a18;
}

/* HEADER */
header{
  background:#2b1e12;
  color:#f3e2b8;
  padding:20px;
  text-align:center;
}

/* CONTENEDOR */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* BUSCADOR */
.search input{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:#fff6dd;
  padding:10px;
  border-radius:6px;
  box-shadow:0 10px 20px rgba(0,0,0,.2);
  display:flex;
  flex-direction:column;
}

.card img{
  width:100%;
  height:300px;
  object-fit:cover;
}

.info{
  padding:10px;
}

.precio{
  font-weight:bold;
  color:#556b2f;
}

.sin-stock{
  color:red;
}

/* BOTÓN */
button{
  margin-top:auto;
  padding:10px;
  background:#6b4b1f;
  color:white;
  border:none;
  cursor:pointer;
}

/* PAGINACIÓN */
#paginacion{
  text-align:center;
  margin-top:30px;
}
</style>
</head>

<body>

<header>
  <h2>Libros de Coleccion Quito</h2>
  <small>Catálogo de libros</small>
</header>

<div class="container">

  <div class="search">
    <input id="buscar" placeholder="Buscar libro...">
  </div>

  <div class="grid" id="catalogo"></div>

  <div id="paginacion"></div>

</div>

<script>
const telefono = "593979255932";
const LIBROS_POR_PAGINA = 20;

let libros = [];
let librosFiltrados = [];
let paginaActual = 1;

/* -------- CARGAR JSON -------- */
fetch("catalogo_libros.json")
  .then(r => r.json())
  .then(data => {
    libros = data;
    librosFiltrados = data;
    renderLibros();
  });

/* -------- BUSCADOR -------- */
document.getElementById("buscar").addEventListener("input", e => {
  const t = e.target.value.toLowerCase();

  librosFiltrados = libros.filter(l =>
    l.titulo.toLowerCase().includes(t)
  );

  paginaActual = 1;
  renderLibros();
});

/* -------- RENDER -------- */
function renderLibros(){
  const grid = document.getElementById("catalogo");
  grid.innerHTML = "";

  const inicio = (paginaActual - 1) * LIBROS_POR_PAGINA;
  const fin = inicio + LIBROS_POR_PAGINA;

  librosFiltrados.slice(inicio, fin).forEach(libro => {
    crearCard(libro);
  });

  renderPaginacion(librosFiltrados.length);
}

/* -------- CARD -------- */
function crearCard(libro){
  const grid = document.getElementById("catalogo");

  const card = document.createElement("div");
  card.className = "card";

  const img = document.createElement("img");
  img.src = libro.imagen || generarPortada(libro.titulo);

  img.onerror = () => {
    img.src = generarPortada(libro.titulo);
  };

  const info = document.createElement("div");
  info.className = "info";

  info.innerHTML = `
    <h3>${libro.titulo}</h3>
    <p>${libro.descripcion_comercial}</p>
    <p class="precio">$${libro.precio}</p>
    <p class="${libro.stock == 0 ? 'sin-stock' : ''}">
      ${libro.stock > 0 ? 'Stock: ' + libro.stock : 'Sin stock'}
    </p>
  `;

  const btn = document.createElement("button");
  btn.textContent = "Consultar";

  btn.onclick = () => {
    window.open(
      `https://wa.me/${telefono}?text=${encodeURIComponent(
        "Hola, me interesa: " + libro.titulo
      )}`
    );
  };

  card.append(img, info, btn);
  grid.appendChild(card);
}

/* -------- PAGINACIÓN -------- */
function renderPaginacion(total){
  const totalPaginas = Math.ceil(total / LIBROS_POR_PAGINA);

  document.getElementById("paginacion").innerHTML = `
    <button ${paginaActual==1?'disabled':''}
      onclick="cambiarPagina(${paginaActual-1})">⬅</button>

    Página ${paginaActual} de ${totalPaginas}

    <button ${paginaActual==totalPaginas?'disabled':''}
      onclick="cambiarPagina(${paginaActual+1})">➡</button>
  `;
}

function cambiarPagina(nueva){
  paginaActual = nueva;
  renderLibros();

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });
}

/* -------- PORTADA FALLBACK -------- */
function generarPortada(titulo){
  const canvas = document.createElement("canvas");
  canvas.width = 400;
  canvas.height = 600;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#6b4b1f";
  ctx.fillRect(0,0,400,600);

  ctx.fillStyle = "#fff";
  ctx.font = "20px serif";
  ctx.textAlign = "center";

  ctx.fillText(titulo.substring(0,20),200,300);

  return canvas.toDataURL();
}
</script>

</body>
</html>
