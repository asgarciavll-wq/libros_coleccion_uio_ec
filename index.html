<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Libros de colección en Quito, Ecuador. Ediciones exclusivas, libros antiguos y piezas únicas.">
  <title>Libros de Colección Quito</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #7b1e1e;
      --secondary: #d4af37;
      --bg: #f8f5f2;
      --text: #333;
    }

    * {
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body {
      font-family:'Roboto', sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header {
      background:var(--primary);
      color:white;
      padding:20px;
      text-align:center;
    }

    header h1 {
      font-family:'Playfair Display', serif;
      font-size:28px;
    }

    .hero {
      padding:40px 20px;
      text-align:center;
      color:white;
      background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
      url('https://images.unsplash.com/photo-1512820790803-83ca734da794');
      background-size:cover;
    }

    .hero h2 {
      margin-bottom:15px;
    }

    .search-box input {
      width:80%;
      max-width:400px;
      padding:12px;
      border:none;
      border-radius:5px;
      font-size:16px;
    }

    .container {
      max-width:1100px;
      margin:auto;
      padding:20px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:20px;
    }

    .card {
      background:white;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,.1);
      transition:0.3s;
    }

    .card:hover {
      transform:translateY(-6px);
    }

    .card img {
      width:100%;
      height:260px;
      object-fit:cover;
      background:#eee;
    }

    .card-body {
      padding:15px;
    }

    .card-body h3 {
      font-size:16px;
      margin-bottom:10px;
    }

    .card-body p {
      margin:5px 0;
      font-size:14px;
    }

    .precio {
      margin-top:10px;
      font-size:18px;
      color:var(--primary);
      font-weight:bold;
    }

    .btn {
      display:inline-block;
      margin-top:10px;
      padding:10px;
      background:var(--primary);
      color:white;
      text-decoration:none;
      border-radius:5px;
      font-size:14px;
    }

    footer {
      text-align:center;
      padding:20px;
      background:#222;
      color:white;
      margin-top:40px;
    }

    .whatsapp {
      position:fixed;
      bottom:20px;
      right:20px;
      background:#25D366;
      color:white;
      padding:15px;
      border-radius:50%;
      font-size:20px;
      text-decoration:none;
    }
  </style>
</head>

<body>

<header>
  <h1>📚 Libros de Colección Quito</h1>
</header>

<section class="hero">
  <h2>Encuentra libros únicos y clásicos</h2>

  <div class="search-box">
    <input type="text" id="buscador" placeholder="Buscar por título, autor o descripción...">
  </div>
</section>

<section class="container">
  <div class="grid" id="libros"></div>
</section>

<footer>
  <p>&copy; 2026 Libros de Colección Quito</p>
</footer>

<a class="whatsapp"
href="https://wa.me/593999999999?text=Hola,%20quiero%20información%20de%20los%20libros"
target="_blank">💬</a>

<script>
let librosData = [];

// 📚 Generar imagen automáticamente
function obtenerImagen(titulo) {
  return `https://covers.openlibrary.org/b/title/${encodeURIComponent(titulo)}-L.jpg`;
}

// 🎯 Mostrar libros
function mostrarLibros(lista) {
  const contenedor = document.getElementById('libros');
  contenedor.innerHTML = '';

  lista.forEach(libro => {
    const card = document.createElement('div');
    card.classList.add('card');

    const imagenURL = obtenerImagen(libro.TITULO);

    card.innerHTML = `
      <img src="${imagenURL}" alt="${libro.TITULO}"
      onerror="this.src='https://via.placeholder.com/300x400?text=Sin+Imagen'">

      <div class="card-body">
        <h3>${libro.TITULO}</h3>

        <p><strong>Autor:</strong> ${libro.AUTOR || "Desconocido"}</p>
        <p><strong>Año:</strong> ${libro.AÑO || "N/A"}</p>

        <p>${libro.DESCRIPCION_COMERCIAL}</p>

        <div class="precio">$${libro.PRECIO}</div>

        <a class="btn"
        href="https://wa.me/593999999999?text=Hola,%20me%20interesa%20el%20libro:%20${encodeURIComponent(libro.TITULO)}"
        target="_blank">Consultar</a>
      </div>
    `;

    contenedor.appendChild(card);
  });
}

// 📦 Cargar JSON
fetch('catalogo_libros.json')
  .then(res => res.json())
  .then(data => {
    librosData = data;
    mostrarLibros(librosData);
  });

// 🔍 Buscador en tiempo real
document.getElementById('buscador').addEventListener('keyup', e => {
  const texto = e.target.value.toLowerCase();

  const filtrados = librosData.filter(libro =>
    libro.TITULO.toLowerCase().includes(texto) ||
    (libro.AUTOR && libro.AUTOR.toLowerCase().includes(texto)) ||
    libro.DESCRIPCION_COMERCIAL.toLowerCase().includes(texto)
  );

  mostrarLibros(filtrados);
});
</script>

</body>
</html>
