<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Libros de Colección Quito</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #7b1e1e;
      --bg: #f8f5f2;
      --text: #333;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'Roboto', sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header {
      background:white;
      padding:15px;
      box-shadow:0 2px 10px rgba(0,0,0,.1);
      display:flex;
      align-items:center;
      gap:10px;
    }

    header img { height:50px; }

    header h1 {
      font-family:'Playfair Display', serif;
      color:var(--primary);
    }

    .hero {
      padding:60px 20px;
      text-align:center;
      color:white;
      background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
      url('https://images.unsplash.com/photo-1512820790803-83ca734da794');
      background-size:cover;
    }

    .search-box input {
      width:90%;
      max-width:450px;
      padding:12px;
      border:none;
      border-radius:30px;
      margin-top:20px;
    }

    .container {
      max-width:1100px;
      margin:auto;
      padding:40px 20px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card {
      background:white;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,.1);
      transition:.3s;
    }

    .card:hover {
      transform:translateY(-5px);
    }

    .card img {
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .card-body {
      padding:15px;
    }

    .card-body h3 {
      font-size:16px;
      margin-bottom:5px;
    }

    .card-body p {
      font-size:14px;
      margin-bottom:4px;
    }

    .btn {
      display:inline-block;
      margin-top:10px;
      padding:8px 12px;
      background:var(--primary);
      color:white;
      text-decoration:none;
      border-radius:5px;
    }

    footer {
      text-align:center;
      padding:20px;
      background:#222;
      color:white;
    }

    .whatsapp {
      position:fixed;
      bottom:20px;
      right:20px;
      background:#25D366;
      color:white;
      padding:15px;
      border-radius:50%;
      font-size:20px;
      text-decoration:none;
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png" alt="Logo">
  <h1>Libros de Colección Quito</h1>
</header>

<section class="hero">
  <h2>Encuentra tu libro ideal 📚</h2>

  <div class="search-box">
    <input type="text" id="buscador" placeholder="Buscar por título, autor o descripción...">
  </div>
</section>

<section class="container">
  <div class="grid" id="libros"></div>
</section>

<footer>
  <p>&copy; 2026 Libros de Colección Quito</p>
</footer>

<a class="whatsapp" href="https://wa.me/593979255932?text=Hola,%20quiero%20información%20de%20los%20libros" target="_blank">💬</a>

<script>
let librosData = [];

function mostrarLibros(lista) {
  const contenedor = document.getElementById('libros');
  contenedor.innerHTML = '';

  if(lista.length === 0){
    contenedor.innerHTML = "<p>No se encontraron libros 😢</p>";
    return;
  }

  lista.forEach(libro => {

    const imagen = "https://images.unsplash.com/photo-1512820790803-83ca734da794";

    const card = document.createElement('div');
    card.classList.add('card');

    card.innerHTML = `
      <img src="${imagen}" alt="${libro.TITULO}">
      <div class="card-body">
        <h3>${libro.TITULO}</h3>
        <p><strong>Autor:</strong> ${libro.AUTOR || 'Desconocido'}</p>
        <p><strong>Precio:</strong> $${libro.PRECIO}</p>
        <p><strong>Stock:</strong> ${libro.CANTIDAD}</p>
        <p>${libro.DESCRIPCION_COMERCIAL}</p>

        <a class="btn" 
        href="https://wa.me/593979255932?text=Hola,%20me%20interesa%20el%20libro:%20${encodeURIComponent(libro.TITULO)}%20Precio:%20$${libro.PRECIO}" 
        target="_blank">
        Consultar
        </a>
      </div>
    `;

    contenedor.appendChild(card);
  });
}

// Cargar JSON
fetch('catalogo_libros.json')
  .then(res => res.json())
  .then(data => {
    librosData = data;
    mostrarLibros(librosData);
  });

// Buscador
document.getElementById('buscador').addEventListener('keyup', e => {
  const texto = e.target.value.toLowerCase();

  const filtrados = librosData.filter(libro =>
    (libro.TITULO || '').toLowerCase().includes(texto) ||
    (libro.AUTOR || '').toLowerCase().includes(texto) ||
    (libro.DESCRIPCION_COMERCIAL || '').toLowerCase().includes(texto)
  );

  mostrarLibros(filtrados);
});
</script>

</body>
</html>
