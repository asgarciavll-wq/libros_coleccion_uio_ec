<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Libros de colección en Quito, Ecuador. Ediciones exclusivas, libros antiguos y piezas únicas.">
  <title>Libros de Colección Quito</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #7b1e1e;
      --secondary: #d4af37;
      --bg: #f8f5f2;
      --text: #333;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Roboto', sans-serif; background:var(--bg); color:var(--text); }

    header { background:var(--primary); color:white; padding:20px; text-align:center; }
    header h1 { font-family:'Playfair Display', serif; }
    nav a { color:var(--secondary); margin:0 10px; text-decoration:none; }

    .hero { padding:40px 20px; text-align:center; color:white;
      background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)), url('https://images.unsplash.com/photo-1512820790803-83ca734da794');
      background-size:cover; }

    .search-box {
      margin-top:20px;
    }

    .search-box input {
      width:80%;
      max-width:400px;
      padding:10px;
      border:none;
      border-radius:5px;
      font-size:16px;
    }

    .container { max-width:1100px; margin:auto; padding:20px; }

    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; }

    .card { background:white; border-radius:10px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,.1); }
    .card img { width:100%; height:200px; object-fit:cover; }
    .card-body { padding:15px; }

    .btn { display:inline-block; margin-top:10px; padding:10px; background:var(--primary); color:white; text-decoration:none; border-radius:5px; }

    footer { text-align:center; padding:20px; background:#222; color:white; margin-top:40px; }

    .whatsapp {
      position:fixed;
      bottom:20px;
      right:20px;
      background:#25D366;
      color:white;
      padding:15px;
      border-radius:50%;
      font-size:20px;
      text-decoration:none;
    }
  </style>
</head>

<body>

<header>
  <h1>📚 Libros de Colección Quito</h1>
</header>

<section class="hero">
  <h2>Busca tu libro ideal</h2>

  <div class="search-box">
    <input type="text" id="buscador" placeholder="Buscar por título o descripción...">
  </div>
</section>

<section class="container">
  <div class="grid" id="libros"></div>
</section>

<footer>
  <p>&copy; 2026 Libros de Colección Quito</p>
</footer>

<a class="whatsapp" href="https://wa.me/593999999999?text=Hola,%20quiero%20información%20de%20los%20libros" target="_blank">💬</a>

<script>
let librosData = [];

function mostrarLibros(lista) {
  const contenedor = document.getElementById('libros');
  contenedor.innerHTML = '';

  lista.forEach(libro => {
    const card = document.createElement('div');
    card.classList.add('card');

    card.innerHTML = `
      <img src="${libro.imagen}" alt="${libro.titulo}">
      <div class="card-body">
        <h3>${libro.titulo}</h3>
        <p>${libro.descripcion}</p>
        <a class="btn" href="https://wa.me/593999999999?text=Hola,%20me%20interesa%20el%20libro:%20${encodeURIComponent(libro.titulo)}" target="_blank">Consultar</a>
      </div>
    `;

    contenedor.appendChild(card);
  });
}

// Cargar JSON (usa tu archivo catalogo_libros_json.json)
fetch('catalogo_libros_json.json')
  .then(res => res.json())
  .then(data => {
    librosData = data;
    mostrarLibros(librosData);
  });

// Buscador en tiempo real
document.getElementById('buscador').addEventListener('keyup', e => {
  const texto = e.target.value.toLowerCase();

  const filtrados = librosData.filter(libro =>
    libro.titulo.toLowerCase().includes(texto) ||
    libro.descripcion.toLowerCase().includes(texto)
  );

  mostrarLibros(filtrados);
});
</script>

</body>
</html>
